name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "pyproject.toml"
      - ".github/workflows/build-android.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "pyproject.toml"
      - ".github/workflows/build-android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: android/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: cd android && npm ci

      - name: Lint & typecheck
        run: |
          cd android
          npm run lint
          npm run format:check
          npm run typecheck

      - name: Determine variant
        id: variant
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "EXPO_PUBLIC_APP_VARIANT=dev" >> "$GITHUB_ENV"
            echo "apk_name=moods-dev.apk" >> "$GITHUB_OUTPUT"
          else
            echo "EXPO_PUBLIC_APP_VARIANT=release" >> "$GITHUB_ENV"
            echo "apk_name=moods-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Expo prebuild
        run: cd android && npx expo prebuild --platform android --clean

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/android/app/build.gradle') }}
          restore-keys: gradle-

      - name: Build APK
        run: cd android/android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.variant.outputs.apk_name }}
          path: android/android/app/build/outputs/apk/release/*.apk

      - name: Get version
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        if: github.ref == 'refs/heads/main'
        id: tag_check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            android/android/app/build/outputs/apk/release/*.apk \
            --title "Moods ${{ steps.version.outputs.tag }}" \
            --generate-notes \
          || gh release upload "${{ steps.version.outputs.tag }}" \
            android/android/app/build/outputs/apk/release/*.apk --clobber
