type SendCodeResult {
  success: Boolean!
}

type AuthPayload {
  token: String!
  user: User!
}

type RefreshPayload {
  token: String!
}

extend type Mutation {
  sendLoginCode(email: String!): SendCodeResult!
  verifyLoginCode(email: String!, code: String!): AuthPayload!
  refreshToken: RefreshPayload!
}
