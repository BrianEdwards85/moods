type User {
  id: ID!
  name: String!
  email: String!
  icon: String!
  settings: JSON!
  archivedAt: DateTime
  entries(
    includeArchived: Boolean = false
    first: Int
    after: String
  ): MoodEntryConnection!
  sharedWith: [ShareRule!]!
}

type ShareFilter {
  id: ID!
  pattern: String!
  isInclude: Boolean!
  archivedAt: DateTime
}

type ShareRule {
  id: ID!
  user: User!
  filters: [ShareFilter!]!
  archivedAt: DateTime
}

# --- Queries ---

extend type Query {
  users(includeArchived: Boolean = false): [User!]!
  user(id: ID!): User
  searchUsers(search: String!): [User!]!
}

# --- Mutations ---

input CreateUserInput {
  name: String!
  email: String!
}

input UpdateUserSettingsInput {
  settings: JSON!
}

input ShareFilterInput {
  pattern: String!
  isInclude: Boolean!
}

input ShareRuleInput {
  userId: ID!
  filters: [ShareFilterInput!]!
}

input UpdateSharingInput {
  rules: [ShareRuleInput!]!
}

extend type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUserSettings(input: UpdateUserSettingsInput!): User!
  archiveUser(id: ID!): User!
  updateSharing(input: UpdateSharingInput!): User!
}
